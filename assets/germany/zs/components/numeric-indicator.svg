<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 82" role="img" aria-labelledby="title desc">
  <title id="title">Reusable German numeric indicator</title>
  <desc id="desc">Configurable illuminated numeral for Zs 3 or Zs 3v.</desc>
  <rect id="indicator-case" x="5" y="5" width="110" height="72" rx="6" fill="#151515" stroke="#080808" stroke-width="6"/>
  <text id="indicator-value" x="60" y="59" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="var(--indicator-colour, #ffffff)">6</text>
</svg>
