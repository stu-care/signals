<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 180" role="img" aria-labelledby="title desc">
  <title id="title">German light shunting signals</title>
  <desc id="desc">Recognition-grade illustrations for Sh 0 and the visually matching Sh 1 or Ra 12 display.</desc>
  <defs>
    <g id="head">
      <rect x="0" y="0" width="150" height="100" rx="12" fill="#202124" stroke="#111" stroke-width="6"/>
    </g>
  </defs>
  <g id="sh0" transform="translate(30 40)">
    <use href="#head"/>
    <circle cx="48" cy="50" r="18" fill="#ef3b3b"/>
    <circle cx="102" cy="50" r="18" fill="#ef3b3b"/>
  </g>
  <g id="sh1-ra12" transform="translate(240 40)">
    <use href="#head"/>
    <circle cx="48" cy="68" r="18" fill="#f5f5f5"/>
    <circle cx="102" cy="32" r="18" fill="#f5f5f5"/>
  </g>
</svg>
