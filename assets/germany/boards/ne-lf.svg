<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 260" role="img" aria-labelledby="title desc">
  <title id="title">German Ne and Lf boards</title>
  <desc id="desc">Recognition-grade sprite containing Ne 1, Ne 2, Lf 6 and Lf 7 with example speed numeral 6.</desc>
  <g id="ne1" transform="translate(25 30)">
    <path d="M20 0 H130 L150 115 H0 Z" fill="#fff" stroke="#111" stroke-width="7"/>
    <rect x="65" y="115" width="20" height="90" fill="#eee" stroke="#111" stroke-width="4"/>
    <rect x="65" y="135" width="20" height="22" fill="#111"/>
    <rect x="65" y="179" width="20" height="22" fill="#111"/>
  </g>
  <g id="ne2" transform="translate(230 30)">
    <rect width="150" height="115" fill="#fff" stroke="#111" stroke-width="7"/>
    <path d="M15 15 L75 57.5 L15 100 Z M135 15 L75 57.5 L135 100 Z" fill="#111"/>
  </g>
  <g id="lf6" transform="translate(445 20)">
    <path d="M0 0 H150 L75 135 Z" fill="#ffd63d" stroke="#111" stroke-width="7"/>
    <text x="75" y="75" text-anchor="middle" font-family="sans-serif" font-size="64" font-weight="700">6</text>
  </g>
  <g id="lf7" transform="translate(655 30)">
    <rect width="120" height="120" fill="#fff" stroke="#111" stroke-width="7"/>
    <text x="60" y="86" text-anchor="middle" font-family="sans-serif" font-size="70" font-weight="700">6</text>
  </g>
</svg>
