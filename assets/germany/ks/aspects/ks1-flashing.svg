<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 360" role="img" aria-labelledby="title desc">
  <title id="title">Flashing Ks 1 with Zs 3v placeholder</title>
  <desc id="desc">Simplified Ks signal showing flashing green and a yellow speed pre-indicator placeholder.</desc>
  <style>
    @keyframes flash { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.15; } }
    #lamp-green { animation: flash 1s steps(1, end) infinite; }
  </style>
  <rect x="42" y="18" width="96" height="176" rx="18" fill="#202124" stroke="#111" stroke-width="6"/>
  <circle cx="90" cy="72" r="25" fill="#151515" stroke="#090909" stroke-width="5"/>
  <circle id="lamp-green" cx="90" cy="72" r="18" fill="#29d657"/>
  <circle cx="90" cy="140" r="25" fill="#151515" stroke="#090909" stroke-width="5"/>
  <circle id="lamp-yellow" cx="90" cy="140" r="18" fill="#343434"/>
  <rect x="50" y="204" width="80" height="62" rx="4" fill="#161616" stroke="#111" stroke-width="5"/>
  <text id="zs3v-value" x="90" y="250" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="700" fill="#ffd83d">6</text>
  <rect x="82" y="266" width="16" height="78" rx="4" fill="#777"/>
</svg>
